name: Cypress Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run API specs
        uses: cypress-io/github-action@v6
        with:
          spec: cypress/e2e/api/**/*.cy.js
          browser: chrome
        env:
          CYPRESS_apiUrl: ${{ secrets.CYPRESS_apiUrl }}

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: api-screenshots
          path: cypress/screenshots
          retention-days: 7

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run frontend specs
        uses: cypress-io/github-action@v6
        with:
          spec: cypress/e2e/frontend/**/*.cy.js
          browser: chrome
        env:
          CYPRESS_apiUrl: ${{ secrets.CYPRESS_apiUrl }}

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: frontend-screenshots
          path: cypress/screenshots
          retention-days: 7
